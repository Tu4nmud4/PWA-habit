<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeQuest - Daily Tracker</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="./icon.svg">
    
    <style>
        :root {
            --bg-color: #0f172a; --surface-color: #1e293b; --text-primary: #f8fafc;
            --text-secondary: #94a3b8; --accent-primary: #6366f1; --success: #10b981;
            --warning: #f59e0b; --danger: #ef4444; --card-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; padding-bottom: 100px; overscroll-behavior-x: none; }
        
        /* Utility Class untuk Icon SVG */
        .icon { width: 1.25em; height: 1.25em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: inline-block; vertical-align: middle; }
        .icon-sm { width: 1em; height: 1em; }
        .icon-lg { width: 1.5em; height: 1.5em; }
        .icon-xl { width: 2em; height: 2em; }

        /* Header & Top Bar */
        header { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 90; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .menu-btn { background: transparent; border: none; color: var(--text-primary); cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
        .menu-btn:hover { color: var(--accent-primary); }
        .logo { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: none; align-items: center; gap: 6px; }
        @media (min-width: 400px) { .logo { display: flex; } }
        
        .inventory-btn { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); padding: 8px 12px; border-radius: 999px; font-weight: 600; color: var(--success); cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 0.85rem; transition: var(--transition); }
        .inventory-btn:hover { background: rgba(16, 185, 129, 0.25); transform: scale(1.05); }
        .wallet { background: rgba(99, 102, 241, 0.15); border: 1px solid rgba(99, 102, 241, 0.3); padding: 8px 12px; border-radius: 999px; display: flex; align-items: center; gap: 6px; font-weight: 600; color: #818cf8; font-size: 0.85rem; }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100dvh; background: var(--surface-color); z-index: 100; padding: 24px 24px 80px 24px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); transition: var(--transition); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .close-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; display: flex; }
        .close-btn:hover { color: var(--danger); }
        .menu-item { padding: 12px 0; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: var(--transition); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 95; display: none; opacity: 0; transition: opacity 0.3s; }
        .overlay.show { display: block; opacity: 1; }

        /* Tabs Navigation */
        .tabs-container { max-width: 800px; margin: 20px auto 10px; padding: 0 24px; }
        .tabs { display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; gap: 4px; }
        .tab-btn { flex: 1; padding: 12px; display: flex; justify-content: center; align-items: center; gap: 8px; background: transparent; border: none; color: var(--text-secondary); font-weight: 600; border-radius: 8px; cursor: pointer; transition: var(--transition); }
        .tab-btn.active { background: var(--surface-color); color: var(--text-primary); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* Sub-Toolbar */
        .sub-toolbar { max-width: 800px; margin: 0 auto 20px; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .cycle-pills { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .cycle-pills::-webkit-scrollbar { display: none; }
        .pill { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-secondary); padding: 6px 14px; border-radius: 999px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: var(--transition); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
        .pill.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: var(--transition); }
        .filter-btn:hover { background: rgba(255,255,255,0.1); }

        main { max-width: 800px; margin: 0 auto; padding: 0 24px 40px; min-height: 85vh; }
        .dashboard-section { display: none; animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .dashboard-section.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        /* General Card */
        .card { background: var(--surface-color); border-radius: var(--card-radius); padding: 20px; border: 1px solid rgba(255,255,255,0.05); transition: var(--transition); cursor: pointer; position: relative; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        .quest-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .quest-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;}
        .quest-desc { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 20px; flex-grow: 1; line-height: 1.5; }
        .badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; font-weight: 600; background: rgba(255,255,255,0.1); display: inline-flex; align-items: center; gap: 4px; }
        .counter-badge { display: inline-flex; align-items: center; justify-content: center; background: rgba(99, 102, 241, 0.15); color: #818cf8; font-size: 0.75rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; margin-left: 8px; gap: 4px;}

        /* Reward Card */
        .reward-card { background: var(--surface-color); border-radius: var(--card-radius); border: 1px solid rgba(255,255,255,0.05); transition: var(--transition); cursor: pointer; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .reward-banner { height: 90px; display: flex; justify-content: center; align-items: center; color: white; position: relative; }
        .reward-edit-icon { position: absolute; top: 10px; right: 10px; font-size: 0.75rem; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 6px; color: white; backdrop-filter: blur(4px); display: flex; align-items: center; gap: 4px; }
        .reward-body { padding: 16px; display: flex; flex-direction: column; flex-grow: 1; }
        .reward-title-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; line-height: 1.4; color: var(--text-primary); }
        .reward-cost-text { font-size: 1.1rem; font-weight: 700; color: #818cf8; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }

        /* Buttons */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent-primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-primary); }
        .btn-claim { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); border: none; }
        .btn-claim:disabled { background: #334155; color: #64748b; box-shadow: none; cursor: not-allowed; }
        
        .fab { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #c084fc); color: white; border: none; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 80; transition: var(--transition); }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        /* Modals */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: var(--surface-color); padding: 24px; border-radius: var(--card-radius); width: 90%; max-width: 400px; z-index: 100; opacity: 0; visibility: hidden; transition: var(--transition); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
        .modal.open { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .modal-title-with-icon { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.875rem; color: var(--text-secondary); }
        .form-control { width: 100%; padding: 10px; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; color-scheme: dark; }
        .color-picker { width: 100%; height: 40px; border: none; border-radius: 8px; background: none; cursor: pointer; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .modal-actions .btn { flex: 1; }

        /* Inventory Modal Styles */
        .inv-item { background: var(--bg-color); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .inv-item.used { opacity: 0.5; filter: grayscale(100%); }
        .inv-details h4 { font-size: 0.95rem; margin-bottom: 4px; }
        .inv-details p { font-size: 0.75rem; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }

        .empty-state { text-align: center; color: var(--text-secondary); padding: 40px 0; font-style: italic; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(16, 185, 129, 0.9); color: white; padding: 10px 20px; border-radius: 999px; font-weight: 600; font-size: 0.9rem; opacity: 0; pointer-events: none; transition: var(--transition); z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: var(--transition); box-shadow: 0 4px 6px rgba(0,0,0,0.3); flex-shrink: 0; }
        .color-swatch:hover { transform: translateY(-3px); }
        .color-swatch.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 12px rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <svg style="display: none;">
        <symbol id="icon-menu" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" /></symbol>
        <symbol id="icon-sparkle" viewBox="0 0 24 24"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z" /></symbol>
        <symbol id="icon-bag" viewBox="0 0 24 24"><path d="M4 10a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10z"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/><path d="M8 22v-6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v6"/></symbol>
        <symbol id="icon-coin" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M9 9.5h6M9 14.5h6"/></symbol>
        <symbol id="icon-x" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" /></symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" /></symbol>
        <symbol id="icon-save" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></symbol>
        <symbol id="icon-folder" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" /></symbol>
        <symbol id="icon-target" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></symbol>
        <symbol id="icon-gift" viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="14" rx="2"/><path d="M12 5a3 3 0 1 0-3 3"/><path d="M12 5a3 3 0 1 1 3 3"/><path d="M12 8v14"/><path d="M3 13h18"/></symbol>
        <symbol id="icon-filter" viewBox="0 0 24 24"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6" /></symbol>
        <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></symbol>
        <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
        <symbol id="icon-fire" viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></symbol>
        <symbol id="icon-undo" viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></symbol>
        <symbol id="icon-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></symbol>
        <symbol id="icon-infinity" viewBox="0 0 24 24"><path d="M8 8a4 4 0 0 0-4 4v0a4 4 0 0 0 4 4h8a4 4 0 0 0 4-4v0a4 4 0 0 0-4-4H8Z" stroke-dasharray="2 2"/></symbol>
    </svg>

    <header>
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()">
                <svg class="icon icon-lg"><use href="#icon-menu"></use></svg>
            </button>
            <div class="logo">
                <svg class="icon" style="color: #c084fc"><use href="#icon-sparkle"></use></svg> LifeQuest
            </div>
        </div>
        <div class="header-right">
            <button class="inventory-btn" onclick="openInventoryModal()">
                <svg class="icon"><use href="#icon-bag"></use></svg> Hadiahku
            </button>
            <div class="wallet">
                <svg class="icon"><use href="#icon-coin"></use></svg> <span id="point-balance">0</span> PTS
            </div>
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="closeModals()"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Pengaturan</h3>
            <button class="close-btn" onclick="toggleSidebar()"><svg class="icon icon-lg"><use href="#icon-x"></use></svg></button>
        </div>
        <input type="file" id="restoreFile" accept=".json" style="display:none" onchange="processRestore(event)">
        <div class="menu-item" style="color:var(--warning)" onclick="openTrash()">
            <svg class="icon"><use href="#icon-trash"></use></svg> Keranjang Sampah
        </div>
        <div class="menu-item" onclick="backupData()" style="margin-top: 16px;">
            <svg class="icon"><use href="#icon-save"></use></svg> Cadangkan Data
        </div>
        <div class="menu-item" onclick="document.getElementById('restoreFile').click()">
            <svg class="icon"><use href="#icon-folder"></use></svg> Pulihkan Data
        </div>
        <div style="margin-top:auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px;"></div>
        <div class="menu-item" style="color:var(--danger)" onclick="deleteAllData()">
            <svg class="icon"><use href="#icon-trash"></use></svg> Hapus Semua Data
        </div>
    </div>

    <div class="tabs-container">
        <div class="tabs" id="main-tabs">
            <button class="tab-btn active" data-target="quests" onclick="switchTab('quests')">
                <svg class="icon"><use href="#icon-target"></use></svg> Quest Aktif
            </button>
            <button class="tab-btn" data-target="rewards" onclick="switchTab('rewards')">
                <svg class="icon"><use href="#icon-gift"></use></svg> Reward Store
            </button>
        </div>
    </div>

    <div class="sub-toolbar" id="quest-toolbar">
        <div class="cycle-pills">
            <button class="pill active" onclick="setCycle('harian', this)">Harian <svg class="icon icon-sm"><use href="#icon-undo"></use></svg></button>
            <button class="pill" onclick="setCycle('mingguan', this)">Mingguan</button>
            <button class="pill" onclick="setCycle('bulanan', this)">Bulanan</button>
        </div>
        <button class="filter-btn" onclick="openFilterModal()">
            <svg class="icon icon-sm"><use href="#icon-filter"></use></svg> Filter
        </button>
    </div>

    <main id="swipe-area">
        <div id="section-quests" class="dashboard-section active"><div class="grid" id="quests-container"></div></div>
        <div id="section-rewards" class="dashboard-section"><div class="grid" id="rewards-container"></div></div>
        <div id="section-trash" class="dashboard-section">
            <h2 style="font-size: 1.25rem; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; display: flex; align-items: center; gap: 10px;">
                <svg class="icon"><use href="#icon-trash"></use></svg> Riwayat & Sampah
            </h2>
            <div class="grid" id="trash-container"></div>
        </div>
    </main>

    <button class="fab" id="main-fab" onclick="handleFabClick()">
        <svg class="icon icon-lg"><use href="#icon-plus"></use></svg>
    </button>
    
    <div class="toast" id="toast-msg">
        <svg class="icon"><use href="#icon-coin"></use></svg> +10 PTS!
    </div>

    <div class="modal" id="questModal">
        <div class="modal-title-with-icon" id="questModalTitle">
            <svg class="icon"><use href="#icon-edit"></use></svg> Atur Quest
        </div>
        <input type="hidden" id="quest-id">
        <div class="form-group"><label>Judul Quest</label><input type="text" id="quest-title" class="form-control" placeholder="Contoh: Sesi Deep Work"></div>
        <div class="form-group"><label>Deskripsi Singkat</label><input type="text" id="quest-desc" class="form-control" placeholder="Detail tugas"></div>
        <div style="display:flex; gap:12px;">
            <div class="form-group" style="flex:1;"><label>Poin</label><input type="number" id="quest-points" class="form-control" value="10"></div>
            <div class="form-group" style="flex:1;"><label>Warna</label><input type="color" id="quest-color" class="color-picker" value="#6366f1"></div>
        </div>
        <div class="form-group"><label>Siklus Tugas</label>
            <select id="quest-cycle" class="form-control">
                <option value="harian">Harian</option>
                <option value="mingguan">Mingguan</option>
                <option value="bulanan">Bulanan</option>
            </select>
        </div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="closeModals()">Batal</button><button class="btn btn-primary" onclick="saveQuest()">Simpan</button></div>
    </div>

    <div class="modal" id="rewardModal">
        <div class="modal-title-with-icon" id="rewardModalTitle">
            <svg class="icon"><use href="#icon-gift"></use></svg> Atur Reward
        </div>
        <input type="hidden" id="reward-id">
        <div class="form-group"><label>Nama Reward</label><input type="text" id="reward-title" class="form-control" placeholder="Contoh: Beli Game Baru"></div>
        <div class="form-group"><label>Harga (Poin)</label><input type="number" id="reward-cost" class="form-control" value="50"></div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="closeModals()">Batal</button><button class="btn btn-primary" onclick="saveReward()">Simpan</button></div>
    </div>

    <div class="modal" id="inventoryModal">
        <div class="modal-title-with-icon">
            <svg class="icon"><use href="#icon-bag"></use></svg> Tas Hadiahku
        </div>
        <div id="inventory-container" style="max-height: 50vh; overflow-y: auto; padding-right: 4px;"></div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="closeModals()">Tutup</button></div>
    </div>

    <div class="modal" id="filterModal">
        <div class="modal-title-with-icon">
            <svg class="icon"><use href="#icon-filter"></use></svg> Filter & Urutkan
        </div>
        <div class="form-group">
            <label>Urutkan Berdasarkan</label>
            <select id="sort-select" class="form-control" onchange="applyFilters()">
                <option value="newest">Terbaru</option>
                <option value="oldest">Terlama</option>
                <option value="highest">Poin Tertinggi</option>
                <option value="lowest">Poin Terendah</option>
            </select>
        </div>
        <div class="form-group" style="margin-top: 24px;">
            <label>Filter Warna</label>
            <div id="color-swatches-container" style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px;"></div>
        </div>
        <div class="modal-actions"><button class="btn btn-primary" onclick="closeModals()">Tutup & Terapkan</button></div>
    </div>

    <script>
        let currentTab = 'quests'; let activeCycle = 'harian'; let currentSort = 'newest'; let currentColorFilter = 'all';
        let currentPoints = 0; let quests = []; let rewards = []; let inventory = []; 
        const rewardGradients = ['linear-gradient(135deg, #2563eb, #8b5cf6)','linear-gradient(135deg, #059669, #3b82f6)','linear-gradient(135deg, #ea580c, #e11d48)','linear-gradient(135deg, #db2777, #7c3aed)','linear-gradient(135deg, #4f46e5, #0ea5e9)'];

        function loadData() {
            const saved = localStorage.getItem('lifeQuestDataV2');
            if (saved) {
                const data = JSON.parse(saved);
                currentPoints = data.points || 0; quests = data.quests || []; rewards = data.rewards || []; inventory = data.inventory || [];
                quests.forEach(q => { if(!q.cycle) q.cycle = 'harian'; if(q.completedCount === undefined) q.completedCount = q.isCompleted ? 1 : 0; });
            } else {
                quests = [
                    { id: Date.now(), title: "Sesi Deep Work", desc: "Fokus menyusun materi ajar.", points: 50, color: "#ef4444", cycle: 'harian', completedCount: 0, isArchived: false },
                    { id: Date.now()+1, title: "Micro-learning", desc: "Eksplor UI/UX & Coding.", points: 25, color: "#f59e0b", cycle: 'harian', completedCount: 0, isArchived: false }
                ];
                rewards = [{ id: Date.now(), title: "Bebas Gadget / Game", cost: 100, isArchived: false }];
            }
            updateWalletUI(); updateColorFilterOptions();
        }

        function saveData() { localStorage.setItem('lifeQuestDataV2', JSON.stringify({ points: currentPoints, quests, rewards, inventory })); }
        function updateWalletUI() { document.getElementById('point-balance').innerText = currentPoints; }
        function renderAll() { renderQuests(); renderRewards(); renderTrash(); updateWalletUI(); updateColorFilterOptions(); }

        function setCycle(cycle, btnElement) {
            activeCycle = cycle;
            document.querySelectorAll('.cycle-pills .pill').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            renderQuests();
        }

        function applyFilters() { currentSort = document.getElementById('sort-select').value; renderQuests(); }
        function setColorFilter(color) { currentColorFilter = color; updateColorFilterOptions(); applyFilters(); }

        function updateColorFilterOptions() {
            const container = document.getElementById('color-swatches-container');
            const uniqueColors = [...new Set(quests.filter(q => !q.isArchived).map(q => q.color))];
            
            container.innerHTML = `
                <div class="color-swatch ${currentColorFilter === 'all' ? 'active' : ''}" style="background: conic-gradient(#ef4444, #f59e0b, #10b981, #3b82f6, #8b5cf6, #ef4444);" onclick="setColorFilter('all')" title="Semua Warna"></div>
            `;
            uniqueColors.forEach(color => {
                container.innerHTML += `<div class="color-swatch ${currentColorFilter === color ? 'active' : ''}" style="background-color: ${color};" onclick="setColorFilter('${color}')" title="Filter warna ${color}"></div>`;
            });
        }

        function renderQuests() {
            const container = document.getElementById('quests-container'); container.innerHTML = '';
            let filtered = quests.filter(q => !q.isArchived && q.cycle === activeCycle);
            if(currentColorFilter !== 'all') filtered = filtered.filter(q => q.color === currentColorFilter);
            
            filtered.sort((a, b) => {
                if(currentSort === 'newest') return b.id - a.id;
                if(currentSort === 'oldest') return a.id - b.id;
                if(currentSort === 'highest') return b.points - a.points;
                if(currentSort === 'lowest') return a.points - b.points;
            });

            if(filtered.length === 0) { container.innerHTML = '<div class="empty-state"><svg class="icon icon-xl"><use href="#icon-target"></use></svg><span>Tidak ada quest di kategori ini.</span></div>'; return; }

            filtered.forEach(quest => {
                const card = document.createElement('div'); card.className = 'card'; card.style.borderTop = `4px solid ${quest.color}`;
                card.onclick = (e) => { if(!e.target.closest('button')) openQuestModal(quest.id); };
                
                const trashBtn = `<button class="btn btn-outline" style="width: 50px; padding: 0;" onclick="moveToTrash('quest', ${quest.id}, event)"><svg class="icon"><use href="#icon-trash"></use></svg></button>`;
                
                let actionBtnHTML = '';
                if(quest.cycle === 'harian') {
                    const counter = quest.completedCount > 0 ? `<span class="counter-badge"><svg class="icon icon-sm"><use href="#icon-fire"></use></svg> ${quest.completedCount}x Selesai</span>` : '';
                    actionBtnHTML = `<button class="btn btn-primary" style="background:${quest.color}; flex:1;" onclick="completeUnlimitedQuest(${quest.id}, event)">Selesaikan (+${quest.points})</button>${trashBtn}`;
                    card.innerHTML = `<div class="quest-header"><div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;"><span class="badge" style="color:${quest.color}; border: 1px solid ${quest.color}40">${quest.points} PTS</span>${counter}</div><span style="font-size:12px; color:var(--text-secondary); display:flex; align-items:center; gap:4px;"><svg class="icon icon-sm"><use href="#icon-edit"></use></svg> Edit</span></div><h3 class="quest-title">${quest.title}</h3><p class="quest-desc">${quest.desc}</p><div style="display:flex; gap:8px;">${actionBtnHTML}</div>`;
                } else {
                    const isDone = quest.completedCount > 0;
                    const btnText = isDone ? `<svg class="icon"><use href="#icon-undo"></use></svg> Batalkan` : `Selesaikan (+${quest.points})`;
                    const btnClass = isDone ? 'btn btn-outline completed' : 'btn btn-primary';
                    actionBtnHTML = `<button class="${btnClass}" style="${isDone ? '' : `background:${quest.color}`}; flex:1;" onclick="toggleStandardQuest(${quest.id}, event)">${btnText}</button>${isDone ? trashBtn : ''}`;
                    card.innerHTML = `<div class="quest-header"><span class="badge" style="color:${quest.color}; border: 1px solid ${quest.color}40">${quest.points} PTS</span><span style="font-size:12px; color:var(--text-secondary); display:flex; align-items:center; gap:4px;"><svg class="icon icon-sm"><use href="#icon-edit"></use></svg> Edit</span></div><h3 class="quest-title" style="${isDone ? 'text-decoration: line-through; opacity:0.6;' : ''}">${quest.title}</h3><p class="quest-desc" style="${isDone ? 'opacity:0.6;' : ''}">${quest.desc}</p><div style="display:flex; gap:8px;">${actionBtnHTML}</div>`;
                }
                container.appendChild(card);
            });
        }

        function renderRewards() {
            const container = document.getElementById('rewards-container'); container.innerHTML = '';
            const activeRewards = rewards.filter(r => !r.isArchived);
            if(activeRewards.length === 0) { container.innerHTML = '<div class="empty-state"><svg class="icon icon-xl"><use href="#icon-gift"></use></svg><span>Toko hadiah kosong.</span></div>'; return; }

            activeRewards.forEach(reward => {
                const card = document.createElement('div'); card.className = 'reward-card';
                card.onclick = (e) => { if(!e.target.closest('button')) openRewardModal(reward.id); };
                const bgGradient = rewardGradients[reward.id % rewardGradients.length];
                const isAffordable = currentPoints >= reward.cost;

                card.innerHTML = `
                    <div class="reward-banner" style="background: ${bgGradient};"><span class="reward-edit-icon"><svg class="icon icon-sm"><use href="#icon-edit"></use></svg> Edit</span><svg class="icon icon-xl"><use href="#icon-gift"></use></svg></div>
                    <div class="reward-body">
                        <h3 class="reward-title-text">${reward.title}</h3>
                        <p class="reward-cost-text"><svg class="icon"><use href="#icon-coin"></use></svg> ${reward.cost} PTS</p>
                        <div style="display:flex; gap:8px; width:100%; margin-top:auto;">
                            <button class="btn btn-claim" style="flex:1;" ${!isAffordable ? 'disabled' : ''} onclick="buyReward(${reward.id}, event)"><svg class="icon"><use href="#icon-bag"></use></svg> Beli & Simpan</button>
                            <button class="btn btn-outline" style="width: 50px; padding: 0;" onclick="moveToTrash('reward', ${reward.id}, event)"><svg class="icon"><use href="#icon-trash"></use></svg></button>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast-msg');
            t.innerHTML = `<svg class="icon"><use href="#icon-coin"></use></svg> ${msg}`; 
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function completeUnlimitedQuest(id, event) { event.stopPropagation(); const q = quests.find(q => q.id === id); q.completedCount++; currentPoints += q.points; saveData(); renderAll(); showToast(`+${q.points} PTS!`); }
        function toggleStandardQuest(id, event) { event.stopPropagation(); const q = quests.find(q => q.id === id); if (q.completedCount === 0) { q.completedCount = 1; currentPoints += q.points; showToast(`+${q.points} PTS!`); } else { q.completedCount = 0; currentPoints -= q.points; } saveData(); renderAll(); }
        function buyReward(id, event) { event.stopPropagation(); const r = rewards.find(r => r.id === id); if (currentPoints >= r.cost) { currentPoints -= r.cost; inventory.push({ id: Date.now(), title: r.title, cost: r.cost, status: 'unused', date: new Date().toISOString() }); saveData(); renderAll(); showToast(`Dibeli! Cek Tas.`); } }

        function openInventoryModal() {
            const container = document.getElementById('inventory-container'); container.innerHTML = '';
            if(inventory.length === 0) { container.innerHTML = '<div class="empty-state"><svg class="icon icon-xl"><use href="#icon-bag"></use></svg><span>Tas masih kosong.</span></div>'; }
            const sortedInv = [...inventory].sort((a,b) => (a.status === 'used' ? 1 : -1));

            sortedInv.forEach(item => {
                const div = document.createElement('div'); div.className = `inv-item ${item.status}`;
                const dateStr = new Date(item.date).toLocaleDateString('id-ID');
                const btnHTML = item.status === 'unused' ? `<button class="btn btn-primary" style="width:auto; padding:6px 12px; font-size:0.75rem;" onclick="useInventoryItem(${item.id})">Gunakan</button>` : `<span style="font-size:0.75rem; color:var(--text-secondary); font-weight:bold;">Telah Dipakai</span>`;
                div.innerHTML = `<div class="inv-details"><h4>${item.title}</h4><p><svg class="icon icon-sm"><use href="#icon-clock"></use></svg> ${dateStr} &bull; ${item.cost} PTS</p></div>${btnHTML}`;
                container.appendChild(div);
            });
            document.getElementById('inventoryModal').classList.add('open'); document.getElementById('overlay').classList.add('show');
        }

        function useInventoryItem(id) { const item = inventory.find(i => i.id === id); if(item && confirm(`Gunakan hadiah "${item.title}" sekarang?`)) { item.status = 'used'; saveData(); openInventoryModal(); } }

        function renderTrash() {
            const container = document.getElementById('trash-container'); container.innerHTML = '';
            const archQ = quests.filter(q => q.isArchived); const archR = rewards.filter(r => r.isArchived);
            if(archQ.length === 0 && archR.length === 0) { container.innerHTML = '<div class="empty-state"><svg class="icon icon-xl"><use href="#icon-trash"></use></svg><span>Kosong.</span></div>'; return; }
            archQ.forEach(q => { const card = document.createElement('div'); card.className = 'card archived'; card.innerHTML = `<h3 class="quest-title" style="text-decoration:line-through">${q.title}</h3><div style="display:flex; gap:8px;"><button class="btn btn-outline" style="flex:1" onclick="restoreTrash('quest',${q.id})"><svg class="icon"><use href="#icon-undo"></use></svg> Kembalikan</button><button class="btn btn-outline" style="flex:1; color:var(--danger); border-color:var(--danger)" onclick="delPerm('quest',${q.id})">Hapus</button></div>`; container.appendChild(card); });
            archR.forEach(r => { const card = document.createElement('div'); card.className = 'card archived'; card.innerHTML = `<h3 class="quest-title" style="color:var(--success)">${r.title} (Store)</h3><div style="display:flex; gap:8px;"><button class="btn btn-outline" style="flex:1" onclick="restoreTrash('reward',${r.id})"><svg class="icon"><use href="#icon-undo"></use></svg> Kembalikan</button><button class="btn btn-outline" style="flex:1; color:var(--danger); border-color:var(--danger)" onclick="delPerm('reward',${r.id})">Hapus</button></div>`; container.appendChild(card); });
        }

        function moveToTrash(type, id, event) { event.stopPropagation(); if(type === 'quest') quests.find(q => q.id === id).isArchived = true; else rewards.find(r => r.id === id).isArchived = true; saveData(); renderAll(); }
        function restoreTrash(type, id) { if(type === 'quest') quests.find(q => q.id === id).isArchived = false; else rewards.find(r => r.id === id).isArchived = false; saveData(); renderAll(); }
        function delPerm(type, id) { if(confirm("Hapus PERMANEN?")) { if(type === 'quest') quests = quests.filter(q => q.id !== id); else rewards = rewards.filter(r => r.id !== id); saveData(); renderAll(); } }
        function backupData() { const blob = new Blob([localStorage.getItem('lifeQuestDataV2')||"{}"], {type:"application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `LifeQuest_${new Date().toISOString().slice(0,10)}.json`; a.click(); toggleSidebar(); }
        function processRestore(event) { const file = event.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = function(e){ try { const data = JSON.parse(e.target.result); if(data.points!==undefined){ localStorage.setItem('lifeQuestDataV2', JSON.stringify(data)); loadData(); renderAll(); alert("Pulih!"); } } catch(err){ alert("Error"); } }; reader.readAsText(file); toggleSidebar(); event.target.value=''; }
        function deleteAllData() { if(confirm("Hapus SEMUA data termasuk Tas Hadiah?")) { currentPoints=0; quests=[]; rewards=[]; inventory=[]; saveData(); renderAll(); toggleSidebar(); switchTab('quests'); } }

        function switchTab(tab) { currentTab = tab; document.querySelectorAll('.tab-btn').forEach(btn => { if(btn.dataset.target === tab) btn.classList.add('active'); else btn.classList.remove('active'); }); document.querySelectorAll('.dashboard-section').forEach(sec => sec.classList.remove('active')); document.getElementById(`section-${tab}`).classList.add('active'); document.getElementById('main-fab').style.display = tab === 'trash' ? 'none' : 'flex'; document.getElementById('quest-toolbar').style.display = tab === 'quests' ? 'flex' : 'none'; }
        function openTrash() { switchTab('trash'); toggleSidebar(); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
        function handleFabClick() { if (currentTab === 'quests') openQuestModal(null); else openRewardModal(null); }
        function openFilterModal() { document.getElementById('filterModal').classList.add('open'); document.getElementById('overlay').classList.add('show'); }

        function openQuestModal(id) {
            document.getElementById('questModalTitle').innerHTML = `<svg class="icon"><use href="#icon-edit"></use></svg> ` + (id ? 'Edit Quest' : 'Tambah Quest');
            const q = id ? quests.find(q => q.id === id) : {id:'', title:'', desc:'', points:10, color:'#6366f1', cycle: activeCycle};
            ['id','title','desc','points','color','cycle'].forEach(k => document.getElementById(`quest-${k}`).value = q[k]);
            document.getElementById('questModal').classList.add('open'); document.getElementById('overlay').classList.add('show');
        }
        function saveQuest() {
            const id = document.getElementById('quest-id').value;
            const q = { title: document.getElementById('quest-title').value || 'Quest', desc: document.getElementById('quest-desc').value, points: parseInt(document.getElementById('quest-points').value)||0, color: document.getElementById('quest-color').value, cycle: document.getElementById('quest-cycle').value };
            if (id) { Object.assign(quests.find(x => x.id == id), q); } else { quests.push({ id: Date.now(), ...q, completedCount: 0, isArchived: false }); }
            saveData(); closeModals(); renderAll();
        }

        function openRewardModal(id) {
            document.getElementById('rewardModalTitle').innerHTML = `<svg class="icon"><use href="#icon-gift"></use></svg> ` + (id ? 'Edit Reward' : 'Tambah Reward');
            const r = id ? rewards.find(r => r.id === id) : {id:'', title:'', cost:100 };
            ['id','title','cost'].forEach(k => document.getElementById(`reward-${k}`).value = r[k]);
            document.getElementById('rewardModal').classList.add('open'); document.getElementById('overlay').classList.add('show');
        }
        function saveReward() {
            const id = document.getElementById('reward-id').value;
            const r = { title: document.getElementById('reward-title').value || 'Reward', cost: parseInt(document.getElementById('reward-cost').value)||0 };
            if (id) { Object.assign(rewards.find(x => x.id == id), r); } else { rewards.push({ id: Date.now(), ...r, isArchived: false }); }
            saveData(); closeModals(); renderAll();
        }

        function closeModals() { document.getElementById('sidebar').classList.remove('open'); document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); document.getElementById('overlay').classList.remove('show'); }

        let touchStartX = 0; let touchEndX = 0; const swipeArea = document.getElementById('swipe-area'); const SWIPE_THRESHOLD = 60;
        swipeArea.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        swipeArea.addEventListener('touchend', (e) => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, { passive: true });
        function handleSwipe() { if (currentTab === 'trash') return; const dist = touchStartX - touchEndX; if (dist > SWIPE_THRESHOLD && currentTab === 'quests') switchTab('rewards'); else if (dist < -SWIPE_THRESHOLD && currentTab === 'rewards') switchTab('quests'); }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }

        loadData(); renderAll();
    </script>
</body>
</html>
